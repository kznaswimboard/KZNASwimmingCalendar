<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZNA Events Calendar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            /* Dark Theme Variables (Default) */
            --bg-grad-1: #020617;
            --bg-grad-2: #0f172a;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --cell-bg: rgba(255,255,255,0.03);
            --cell-hover: rgba(255,255,255,0.08);
            --btn-bg: rgba(255,255,255,0.05);
            --date-bg: rgba(0,0,0,0.2);
            --chip-bg: rgba(255,255,255,0.1);
            --chip-text: #ffffff;
            --glass-blur: 12px;
            
            --level-public: #10b981;
            --level-club: #8b5cf6;
            --level-national: #ef4444;
            --level-provincial: #f59e0b;
            --level-district: #06b6d4;
            --level-school: #ec4899;
            --level-openwater: #3b82f6;
        }

        [data-theme="light"] {
            /* Light Theme Variables */
            --bg-grad-1: #e2e8f0;
            --bg-grad-2: #f8fafc;
            --text-color: #0f172a;
            --text-muted: #475569;
            --primary-color: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.3);
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
            --cell-bg: rgba(255,255,255,0.6);
            --cell-hover: rgba(255,255,255,1);
            --btn-bg: rgba(0,0,0,0.05);
            --date-bg: rgba(0,0,0,0.05);
            --chip-bg: rgba(0,0,0,0.05);
            --chip-text: #0f172a;
            
            --level-public: #059669;
            --level-club: #6d28d9;
            --level-national: #b91c1c;
            --level-provincial: #b45309;
            --level-district: #0e7490;
            --level-school: #be185d;
            --level-openwater: #1d4ed8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            color: var(--text-color);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            padding: 2rem;
            position: relative;
            transition: background 0.5s ease, color 0.5s ease;
        }
        
        /* Background Glow Effects */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
            animation: pulse 10s ease-in-out infinite alternate;
            transition: background 0.5s ease;
        }
        
        body::before {
            top: -20%;
            left: -10%;
            background: var(--primary-color);
        }
        
        body::after {
            bottom: -20%;
            right: -10%;
            background: var(--level-club);
            animation-delay: -5s;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Theme Toggle Switch */
        .theme-toggle-container {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 100;
        }

        .theme-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 3px;
            background-color: var(--primary-color);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 0.5rem;
        }

        .kzna-logo {
            height: 6.5rem;
            width: auto;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .kzna-logo:hover {
            transform: scale(1.05) rotate(-2deg);
            filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.6));
        }

        @media (max-width: 768px) {
            .header-main { flex-direction: column; gap: 0.5rem; }
            .kzna-logo { height: 5rem; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--level-club));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            animation: fadeInDown 0.8s ease-out;
            animation-delay: 0.2s;
            animation-fill-mode: both;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.3s;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] .legend-color {
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Calendar Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            padding: 1rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
            transition: all 0.3s;
        }

        .btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            user-select: none;
        }

        .btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        #current-month {
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 200px;
            text-align: center;
        }

        /* Calendar Grid */
        .calendar-container {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
            transition: all 0.3s;
        }

        .days-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .mobile-day { display: none; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            min-height: 120px;
            padding: 0.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            position: relative;
            overflow: hidden;
        }

        .day-cell:hover {
            background: var(--cell-hover);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .day-cell.empty {
            background: transparent;
            border-color: transparent;
            pointer-events: none;
            box-shadow: none;
        }

        .day-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.8;
        }
        
        .day-cell.today .day-number {
            color: var(--primary-color);
            opacity: 1;
        }
        
        .day-cell.today {
            border-color: var(--primary-color);
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .event-chip {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            background: var(--chip-bg);
            color: var(--chip-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-weight: 600;
        }

        .event-chip:hover {
            filter: brightness(1.2);
            transform: translateX(2px);
        }

        /* Event List Pane */
        .list-pane {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            animation: slideUp 1s ease-out;
            transition: all 0.3s;
        }

        .list-pane h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .event-card {
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 140px 1fr auto;
            gap: 1.5rem;
            align-items: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            scroll-margin-top: 2rem;
        }
        
        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary-color);
            border-radius: 4px 0 0 4px;
        }

        .event-card:hover {
            background: var(--cell-hover);
            transform: translateX(5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .event-card.highlight {
            box-shadow: 0 0 25px var(--primary-glow);
            border-color: var(--primary-color);
            transform: scale(1.02);
            z-index: 10;
        }

        .event-date-block {
            text-align: center;
            background: var(--date-bg);
            padding: 0.75rem;
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80px;
        }

        .event-date-month {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--primary-color);
            font-weight: 700;
        }

        .event-date-day {
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0.2rem 0;
        }

        .event-details h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .event-meta {
            display: flex;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .event-level-badge {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--chip-bg);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Mobile Layout */
        @media (max-width: 1024px) {
            .calendar-container { padding: 1rem; }
            .day-cell { min-height: 100px; padding: 0.25rem; }
            .event-card { grid-template-columns: 120px 1fr; }
            .event-level-badge { grid-column: 1 / -1; justify-self: start; }
            .container { padding: 1rem; }
            .theme-toggle-container { top: 1rem; right: 1rem; }
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .container { padding: 0.5rem; gap: 1rem; margin-top: 2rem; }
            header h1 { font-size: 2rem; }
            
            /* Legend adjustments */
            .legend { gap: 0.8rem; justify-content: center; padding: 0 1rem; }
            .legend-item { font-size: 0.8rem; }
            
            /* Responsive headers for mobile */
            .desktop-day { display: none; }
            .mobile-day { display: inline; font-size: 0.9rem; }
            
            .controls { flex-direction: column; gap: 1rem; padding: 1rem; }
            .controls .btn { width: 100%; }
            
            .calendar-grid { gap: 4px; }
            .day-cell { min-height: 70px; border-radius: 0.5rem; }
            
            /* Hide full chips on mobile, show dots */
            .event-chip { display: none; } 
            .day-cell::after { 
                content: '';
                display: block;
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--primary-color);
                margin: auto;
                opacity: 0;
            }
            .day-cell.has-events::after { opacity: 1; }
            
            /* Adjust list pane for mobile */
            .list-pane { padding: 1rem; margin-top: 1.5rem; }
            .event-card { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
            .event-date-block { flex-direction: row; gap: 1rem; align-items: baseline; justify-content: center; text-align: left; min-height: auto; padding: 0.5rem; }
        }

        /* Tab Navigation */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .tab-btn {
            padding: 0.8rem 2rem;
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            color: var(--text-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(var(--glass-blur));
        }

        .tab-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
            color: white;
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        .search-container {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        
        .no-results {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            background: var(--bg-grad-2);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        
        .modal-title {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        }

            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }


        /* Fullscreen Button */
        #fullscreen-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(59,130,246,0.5);
            transition: all 0.3s ease;
            outline: none;
        }
        #fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(59,130,246,0.7);
        }
        #fullscreen-btn title-tooltip {
            display: none;
        }
        /* ======== PRINT / PDF STYLES ======== */
        #print-container {
            display: none;
        }
        @media print {
            @page { size: A4; margin: 15mm; }
            body * { visibility: hidden; }
            #print-container,
            #print-container * { visibility: visible; }
            #print-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                display: block !important;
                font-family: 'Segoe UI', Arial, sans-serif;
                color: #000 !important;
                background: #fff !important;
            }
            .p-header {
                text-align: center;
                border-bottom: 3px solid #2563eb;
                padding-bottom: 16px;
                margin-bottom: 24px;
            }
            .p-header h1 { margin: 8px 0 4px; font-size: 22pt; color: #1e293b; }
            .p-header p  { margin: 0; font-size: 11pt; color: #555; }
            .p-header img { height: 70px; }
            .p-month {
                page-break-inside: avoid;
                margin-bottom: 20px;
            }
            .p-month h2 {
                font-size: 13pt;
                text-transform: uppercase;
                color: #2563eb;
                border-bottom: 1.5px solid #2563eb;
                padding-bottom: 4px;
                margin-bottom: 8px;
            }
            .p-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 9pt;
            }
            .p-table th {
                background: #e8f0fe;
                color: #1e3a8a;
                text-align: left;
                padding: 6px 8px;
                border-bottom: 2px solid #2563eb;
                font-weight: 700;
            }
            .p-table td {
                padding: 6px 8px;
                border-bottom: 1px solid #e2e8f0;
                vertical-align: top;
            }
            .p-table tr { page-break-inside: avoid; }
            .p-date { font-weight: 700; white-space: nowrap; }
            .p-name { font-weight: 600; color: #1d4ed8; }
            .p-level { font-size: 7.5pt; color: #666; }
            .p-footer {
                text-align: center;
                font-size: 8pt;
                color: #999;
                margin-top: 24px;
                border-top: 1px solid #eee;
                padding-top: 8px;
            }
        }
    </style>
</head>

        // Dynamically calculate season bounds based ONLY on actual sporting events (exclude public holidays)
        const activeEvents = eventsData.filter(e => !e.level || !e.level.toLowerCase().includes('public'));
        
        if (activeEvents.length > 0) {
            const earliest = new Date(Math.min(...activeEvents.map(e => new Date(e.startDate))));
            const latest = new Date(Math.max(...activeEvents.map(e => new Date(e.endDate))));
            
            // Set bounds to the start of the earliest month, and end of the latest month
            minDate = new Date(earliest.getFullYear(), earliest.getMonth(), 1);
            maxDate = new Date(latest.getFullYear(), latest.getMonth() + 1, 0); 
        } else {
            minDate = new Date();
            maxDate = new Date();
        }
        
        currentDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
        
        // Remove any public holidays that fall completely outside the actual season dates
        finalEventsData = eventsData.filter(e => {
            if (e.level && e.level.toLowerCase().includes('public')) {
                const d = new Date(e.startDate);
                if (activeEvents.length > 0) {
                    const seasonStart = new Date(Math.min(...activeEvents.map(ev => new Date(ev.startDate))));
                    const seasonEnd = new Date(Math.max(...activeEvents.map(ev => new Date(ev.endDate))));
                    if (d < seasonStart || d > seasonEnd) return false;
                }
            }
            return true;
        });

        function getLevelColor(level) {
            if (!level) return 'rgba(128,128,128,0.5)';
            const l = level.toLowerCase();
            if (l.includes('public')) return 'var(--level-public)';
            if (l.includes('club')) return 'var(--level-club)';
            if (l.includes('national')) return 'var(--level-national)';
            if (l.includes('provincial')) return 'var(--level-provincial)';
            if (l.includes('district')) return 'var(--level-district)';
            if (l.includes('school')) return 'var(--level-school)';
            if (l.includes('open water')) return 'var(--level-openwater)';
            return 'rgba(128,128,128,0.5)';
        }
        
        function switchTab(tabId) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.toLowerCase().includes(tabId)) btn.classList.add('active');
            });

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabId + '-tab').classList.add('active');

            if (tabId === 'calendar') renderCalendar();

        function formatDisplayDateRange(startStr, endStr) {
            const ds = new Date(startStr);
            const de = new Date(endStr);
            const sMonth = ds.toLocaleDateString('en-US', { month: 'short' });
            const sDay = ds.getDate();
            const eMonth = de.toLocaleDateString('en-US', { month: 'short' });
            const eDay = de.getDate();
            
            if (startStr === endStr) {
                return `<div class="event-date-month">${sMonth}</div><div class="event-date-day">${sDay}</div>`;
            }
            
            if (sMonth === eMonth) {
                return `<div class="event-date-month">${sMonth}</div><div class="event-date-day" style="font-size: 1.1rem">${sDay} - ${eDay}</div>`;
            } else {
                return `<div class="event-date-month">${sMonth} - ${eMonth}</div><div class="event-date-day" style="font-size: 1.1rem">${sDay} - ${eDay}</div>`;
            }
        }
        
        function scrollToEvent(id) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight');
                setTimeout(() => {
                    el.classList.remove('highlight');
                }, 1500);
            }
        }

        function downloadICS(name, start, end, venue, host) {
            const formatDate = (dateStr) => {
                return new Date(dateStr).toISOString().replace(/-|:|\.\d+/g, '');
            };
            
            const icsContent = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'PRODID:-//KZNA//Events Calendar//EN',
                'BEGIN:VEVENT',
                `SUMMARY:${name}`,
                `DTSTART:${formatDate(start)}`,
                `DTEND:${formatDate(end)}`,
                `LOCATION:${venue || 'TBC'}`,
                `DESCRIPTION:Hosted by ${host || 'KZNA'}`,
                'END:VEVENT',
                'END:VCALENDAR'
            ].join('\n');

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${name.replace(/\s+/g, '_')}.ics`;
            link.click();
        }

        async function shareEvent(name, date, venue) {
            const element = document.getElementById('modal-share-content');
            if (!element) return;

            try {
                // Generate Canvas from the event details
                const canvas = await html2canvas(element, {
                    backgroundColor: '#0f172a', // Dark theme background
                    scale: 2, // Higher quality
                    logging: false,
                    useCORS: true
                });

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `${name.replace(/\s+/g, '_')}.png`, { type: 'image/png' });
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'KZNA Event',
                                text: `${name} - ${date}`
                            });
                        } catch (err) {
                            console.log('User cancelled or error sharing:', err);
                        }
                    } else {
                        // Fallback: Download the image
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `${name.replace(/\s+/g, '_')}.png`;
                        link.click();
                        alert('Your browser does not support image sharing. The event image has been downloaded to your device instead.');
                    }
                });
            } catch (error) {
                console.error('Error generating image:', error);
                alert('Could not generate event image.');
            }
        }

            doc.text('Season 2026 - 2027', 105, 42, { align: 'center' });

            // --- Sort and group events by month ---
            const sorted = [...finalEventsData].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            const groups = {};
            sorted.forEach(e => {
                const key = new Date(e.startDate).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                if (!groups[key]) groups[key] = [];
                groups[key].push(e);

            let startY = 52;

            for (const month in groups) {
                // Month header
                doc.setFillColor(29, 78, 216);

                doc.roundedRect(15, startY, 180, 7, 1, 1, 'F');
                doc.text(month.toUpperCase(), 18, startY + 5);
                startY += 9;

                const rows = groups[month].map(e => {
                    const ds = new Date(e.startDate);
                    const de = new Date(e.endDate);
                    const dateStr = e.startDate === e.endDate
                        ? ds.toLocaleDateString('en-US', { day: 'numeric', month: 'short' })
                        : `${ds.getDate()} - ${de.getDate()} ${ds.toLocaleDateString('en-US', { month: 'short' })}`;
                    return [dateStr, e.name || '', e.level || '', e.venue || 'TBC', e.host || 'KZNA'];
                });

                doc.autoTable({
                    startY: startY,
                    head: [[{ content: 'Date', styles: { halign: 'left' } }, { content: 'Event Name', styles: { halign: 'left' } }, { content: 'Level', styles: { halign: 'left' } }, { content: 'Venue', styles: { halign: 'left' } }, { content: 'Host', styles: { halign: 'left' } }]],
                    body: rows,
                    margin: { left: 15, right: 15 },
                    tableWidth: 180,
                    columnStyles: {
                        0: { cellWidth: 22, fontStyle: 'bold' },
                        1: { cellWidth: 60 },
                        2: { cellWidth: 30 },
                        3: { cellWidth: 42 },
                        4: { cellWidth: 26 }
                    },
                    headStyles: {
                        fillColor: [219, 234, 254],
                        textColor: [30, 58, 138],
                        fontStyle: 'bold',
                        fontSize: 7,
                        halign: 'left'
                    },
                    bodyStyles: {
                        fontSize: 8,
                        textColor: [17, 24, 39],
                        valign: 'top'
                    },
                    alternateRowStyles: { fillColor: [248, 250, 252] },
                    didParseCell: (data) => {
                        if (data.section === 'body' && data.column.index === 1) {
                            data.cell.styles.fontStyle = 'bold';
                        }
                    },
                    styles: { overflow: 'linebreak', cellPadding: 2 },
                    theme: 'grid'
                });

                startY = doc.lastAutoTable.finalY + 6;

                // Page break check
                if (startY > 270) {
                    doc.addPage();
                    startY = 15;
                }
            }

            // Footer
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                doc.setTextColor(148, 163, 184);
                doc.text(`Generated on ${new Date().toLocaleDateString()} - KZNA Official Events Calendar`, 105, 290, { align: 'center' });
                doc.text(`Page ${i} of ${pageCount}`, 195, 290, { align: 'right' });
            }

            doc.save('KZNA_Calendar_2026_2027.pdf');
        }
        function openEventModal(eventData) {
            const modalBody = document.getElementById('modal-body');
            const color = getLevelColor(eventData.level);
            
            // Format full date range for display
            const ds = new Date(eventData.startDate);
            const de = new Date(eventData.endDate);
            const options = { month: 'long', day: 'numeric', year: 'numeric' };
            let dateRangeText = ds.toLocaleDateString('en-US', options);
            
            if (eventData.startDate !== eventData.endDate) {
                if (ds.getMonth() === de.getMonth() && ds.getFullYear() === de.getFullYear()) {
                    dateRangeText = `${ds.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })} - ${de.getDate()}, ${de.getFullYear()}`;
                } else {
                    dateRangeText = `${ds.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })} - ${de.toLocaleDateString('en-US', options)}`;
                }
            }
            
            modalBody.innerHTML = `
                <div id="modal-share-content" style="background: var(--bg-grad-2); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border-color);">
                    <div style="border-left: 8px solid ${color}; padding-left: 1.5rem;">
                        <div style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
                            <img src="${document.querySelector('.kzna-logo') ? document.querySelector('.kzna-logo').src : ''}" style="height: 40px; width: auto;">
                            <span style="font-weight: 700; color: var(--text-muted); font-size: 0.9rem;">KZNA EVENTS</span>
                        </div>
                        <h2 class="modal-title" style="border:none; margin-bottom: 0.5rem; font-size: 1.6rem; line-height: 1.2;">${eventData.name}</h2>
                        <div style="color: var(--primary-color); font-weight: 700; margin-bottom: 1rem; font-size: 1.1rem;">${dateRangeText}</div>
                        
                        <div class="event-meta" style="flex-direction: column; gap: 0.75rem; margin-bottom: 0.5rem; font-size: 1rem;">
                            ${eventData.venue ? `<div style="display:flex; align-items:center; gap:0.5rem"><span>📍</span> <strong>Venue:</strong> ${eventData.venue}</div>` : ''}
                            ${eventData.host ? `<div style="display:flex; align-items:center; gap:0.5rem"><span>🏢</span> <strong>Host:</strong> ${eventData.host}</div>` : ''}
                            <div style="display:flex; align-items:center; gap:0.5rem"><span>🏷️</span> <strong>Level:</strong> ${eventData.level || 'Event'}</div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem;">
                    <button class="btn" style="background: var(--primary-color); color: white; padding: 0.8rem; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;" 
                        onclick="downloadICS('${eventData.name.replace(/'/g, "\'")}', '${eventData.startDate}', '${eventData.endDate}', '${eventData.venue ? eventData.venue.replace(/'/g, "\'") : ''}', '${eventData.host ? eventData.host.replace(/'/g, "\'") : ''}')">
                        <span>📅</span> Add to Calendar
                    </button>
                    <button class="btn" style="padding: 0.8rem; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: var(--btn-bg); border: 1px solid var(--primary-color);" 
                        onclick="shareEvent('${eventData.name.replace(/'/g, "\'")}', '${dateRangeText}', '${eventData.venue ? eventData.venue.replace(/'/g, "\'") : ''}')">
                        <span>📸</span> Share as Image
                    </button>
                </div>
            `;
            
            document.getElementById('modal-overlay').classList.add('active');
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('current-month').innerText = 
                currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            // Fixed Title for All Events View
            document.getElementById('list-title').innerText = "All Events";
                
            // Handle buttons state
            const prevBtn = document.getElementById('prev-month');
            const nextBtn = document.getElementById('next-month');
            
            const currentM = year * 12 + month;
            const minM = minDate.getFullYear() * 12 + minDate.getMonth();
            const maxM = maxDate.getFullYear() * 12 + maxDate.getMonth();
            
            if (currentM <= minM) {
                prevBtn.style.opacity = '0.3';
                prevBtn.style.pointerEvents = 'none';
            } else {
                prevBtn.style.opacity = '1';
                prevBtn.style.pointerEvents = 'auto';
            }
            
            if (currentM >= maxM) {
                nextBtn.style.opacity = '0.3';
                nextBtn.style.pointerEvents = 'none';
            } else {
                nextBtn.style.opacity = '1';
                nextBtn.style.pointerEvents = 'auto';
            }

            let firstDay = new Date(year, month, 1).getDay();
            // Convert JS Sunday=0 to Monday=0
            firstDay = (firstDay === 0) ? 6 : firstDay - 1;
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Previous month padding
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell empty"></div>`;
            }

            // Find events that overlap with this month
            const monthEvents = finalEventsData.filter(e => {
                const sd = new Date(e.startDate);
                const ed = new Date(e.endDate);
                const startM = sd.getFullYear() * 12 + sd.getMonth();
                const endM = ed.getFullYear() * 12 + ed.getMonth();
                return currentM >= startM && currentM <= endM;
            }).sort((a,b) => new Date(a.startDate) - new Date(b.startDate));
            
            // Assign temporary ID for scrolling connection
            monthEvents.forEach((e, idx) => {
                e._id = 'event-card-' + idx;
            });

            // Generate calendar grid
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                const dayEvents = monthEvents.filter(e => {
                    return dateStr >= e.startDate && dateStr <= e.endDate;
                });
                
                let chipsHtml = '';
                dayEvents.forEach(e => {
                    const color = getLevelColor(e.level);
                    // Normal style chip for every day of the event
                    chipsHtml += `<div class="event-chip" style="border-left-color: ${color}" title="${e.name}" onclick="event.stopPropagation(); openEventModal(${JSON.stringify(e).replace(/"/g, '&quot;')})">${e.name}</div>`;
                });

                const hasEventsClass = dayEvents.length > 0 ? 'has-events' : '';
                
                grid.innerHTML += `
                    <div class="day-cell ${hasEventsClass}" onclick="handleDayClick('${dateStr}')">
                        <div class="day-number">${day}</div>
                        ${chipsHtml}
                    </div>
                `;
            }

            // Initial render of all events
            renderListPane();
        }

        function handleDayClick(dateStr) {
            // On mobile, show modal. On desktop, do nothing or show modal.
            if (window.innerWidth > 768) return;
            
            const dayEvents = finalEventsData.filter(e => {
                return dateStr >= e.startDate && dateStr <= e.endDate;
            });
            
            if (dayEvents.length === 0) return;

            // If only one event, open detailed modal directly with share/calendar options
            if (dayEvents.length === 1) {
                openEventModal(dayEvents[0]);
                return;
            }
            
            const modalBody = document.getElementById('modal-body');
            const d = new Date(dateStr);
            const dateTitle = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            
            let html = `<h2 class="modal-title">${dateTitle}</h2>`;
            html += `<p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Tap an event for share & calendar options:</p>`;
            
            dayEvents.forEach(e => {
                const color = getLevelColor(e.level);
                html += `
                    <div class="event-card" style="--primary-color: ${color}; margin-bottom: 1rem; grid-template-columns: 1fr; cursor: pointer; padding: 1rem;" onclick="openEventModal(${JSON.stringify(e).replace(/"/g, '&quot;')})">
                        <div class="event-details">
                            <h3 style="margin-top: 0; font-size: 1.1rem;">${e.name}</h3>
                            <div class="event-meta" style="font-size: 0.9rem;">
                                ${e.venue ? `<span>📍 ${e.venue}</span>` : ''}
                                ${e.host ? `<span>🏢 ${e.host}</span>` : ''}
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                                <div class="event-level-badge" style="color: ${color}; border: 1px solid ${color}; margin-top: 0; display: inline-block; font-size: 0.7rem; padding: 2px 6px;">
                                    ${e.level || 'Event'}
                                </div>
                                <span style="font-size: 0.7rem; color: var(--primary-color); font-weight: 600;">Details & Share →</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            modalBody.innerHTML = html;
            document.getElementById('modal-overlay').classList.add('active');
        }

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('modal-overlay').classList.remove('active');
        });
        
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        });

        function renderListPane(filteredData = null) {
            const list = document.getElementById('event-list');
            list.innerHTML = '';
            
            const displayData = filteredData || finalEventsData;
            
            if (displayData.length === 0) {
                list.innerHTML = `<div class="no-results">No events found matching your search.</div>`;
                return;
            }

            displayData.forEach((e, idx) => {
                const color = getLevelColor(e.level);
                const scrollId = 'list-event-' + idx;
                e._listId = scrollId;

                let metaHtml = '';
                if (e.venue) metaHtml += `<span>📍 ${e.venue}</span>`;
                if (e.host) metaHtml += `<span>🏢 ${e.host}</span>`;

                list.innerHTML += `
                    <div class="event-card" id="${scrollId}" style="--primary-color: ${color}" onclick="openEventModal(${JSON.stringify(e).replace(/"/g, '&quot;')})">
                        <div class="event-date-block">
                            ${formatDisplayDateRange(e.startDate, e.endDate)}
                        </div>
                        <div class="event-details">
                            <h3>${e.name}</h3>
                            <div class="event-meta">
                                ${metaHtml}
                            </div>
                        </div>
                        <div class="event-level-badge" style="color: ${color}; border: 1px solid ${color}">
                            ${e.level || 'Event'}
                        </div>
                    </div>
                `;
            });
        }

        function handleSearch(query) {
            const q = query.toLowerCase().trim();
            if (!q) {
                renderListPane();
                return;
            }
            
            const filtered = finalEventsData.filter(e => {
                return (e.name && e.name.toLowerCase().includes(q)) ||
                       (e.venue && e.venue.toLowerCase().includes(q)) ||
                       (e.host && e.host.toLowerCase().includes(q)) ||
                       (e.level && e.level.toLowerCase().includes(q));
            });
            
            renderListPane(filtered);
        }

        document.getElementById('event-search').addEventListener('input', (e) => {
            handleSearch(e.target.value);
        });

        document.getElementById('prev-month').addEventListener('click', () => {
            if (currentDate.getFullYear() * 12 + currentDate.getMonth() > minDate.getFullYear() * 12 + minDate.getMonth()) {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            }
        });

        document.getElementById('next-month').addEventListener('click', () => {
            if (currentDate.getFullYear() * 12 + currentDate.getMonth() < maxDate.getFullYear() * 12 + maxDate.getMonth()) {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            }
        });



        // Initial render
        renderCalendar();
    </script>
</body>
</html>
